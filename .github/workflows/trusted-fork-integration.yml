name: AI-Horde trusted fork integration

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to test
        required: true
        type: number
      run_horde_sdk_tests:
        description: Also run horde_sdk downstream tests
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: trusted-fork-integration-${{ inputs.pr_number }}
  cancel-in-progress: true

env:
  AI_HORDE_TEST_DEPS_MODE: auto
  AI_HORDE_REQUIRE_TEST_DEPS: '1'
  USE_SQLITE: '0'
  ADMINS: '["test_user#1"]'
  KUDOS_TRUST_THRESHOLD: '100'

jobs:
  resolve-and-validate-pr:
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.pr.outputs.head_sha }}
      head_repo_full_name: ${{ steps.pr.outputs.head_repo_full_name }}
      merge_ref: ${{ steps.pr.outputs.merge_ref }}
    steps:
      - name: Resolve PR metadata and enforce guardrails
        id: pr
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid pr_number: ${process.env.PR_NUMBER}`);
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const labels = (pr.labels || []).map((label) => label.name);
            const isFork = pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`;

            core.info(`PR #${pr.number}: ${pr.title}`);
            core.info(`Head: ${pr.head.repo.full_name}@${pr.head.sha}`);
            core.info(`Labels: ${labels.join(", ")}`);
            core.info(`Merge ref: refs/pull/${pr.number}/merge`);

            if (!labels.includes("allow-ci")) {
              core.setFailed('PR must have the "allow-ci" label.');
              return;
            }
            if (!isFork) {
              core.setFailed("This workflow is only for fork PRs. Same-repo PRs run integration tests automatically.");
              return;
            }

            core.setOutput("head_sha", pr.head.sha);
            core.setOutput("head_repo_full_name", pr.head.repo.full_name);
            core.setOutput("merge_ref", `refs/pull/${pr.number}/merge`);

  runner-job:
    name: In-process pytest suite
    runs-on: ubuntu-latest
    needs: resolve-and-validate-pr
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.resolve-and-validate-pr.outputs.merge_ref }}
          persist-credentials: false
      - uses: ./.github/actions/setup-test-python
        with:
          python-version: '3.13'
      - name: Run unit and integration tests through shared pytest runtime
        run: uv run pytest tests/unit tests/integration -q -rs

  runner-horde-sdk-job:
    name: Server-backed horde_sdk smoke
    runs-on: ubuntu-latest
    needs: resolve-and-validate-pr
    if: ${{ inputs.run_horde_sdk_tests }}
    env:
      PGUSER: postgres
      PGPASSWORD: postgres
      AI_HORDE_DEV_URL: http://localhost:7001/api/
      HORDE_TEST_APIKEYS: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.resolve-and-validate-pr.outputs.merge_ref }}
          persist-credentials: false
      - uses: ./.github/actions/setup-test-python
        with:
          python-version: '3.12'
      - uses: ./.github/actions/start-test-stack

      - name: Start AI-Horde server
        run: |
          uv run python server.py -vvvvi --horde stable > server.log 2>&1 &
          echo "$!" > server.pid

          timeout=120
          until curl -sf http://localhost:7001/api/v2/status/heartbeat > /dev/null 2>&1; do
            timeout=$((timeout - 2))
            if [[ "$timeout" -le 0 ]]; then
              echo "Server failed to start within timeout"
              cat server.log
              exit 1
            fi
            sleep 2
          done

          uv run python tests/integration/bootstrap_test_user.py --horde-url http://localhost:7001 --github-env "$GITHUB_ENV"

      - name: Run horde_sdk tests
        run: |
          python -m venv .venv-sdk
          source .venv-sdk/bin/activate
          python -m pip install --upgrade pip wheel setuptools

          python -m pip download --no-deps --no-binary :all: horde_sdk
          tar -xvf horde_sdk-*.tar.gz
          cd horde_sdk**/
          python -m pip install --group dev
          python -m pytest tests/ --ignore-glob=*api_calls.py --ignore-glob=*test_model_meta.py -s

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: horde-sdk-server-log
          path: server.log
          if-no-files-found: ignore

      - name: Stop server and local test stack
        if: always()
        run: |
          if [[ -f server.pid ]]; then
            kill "$(cat server.pid)" || true
          fi
          docker compose -f tests/docker-compose.yml down

  stress-smoke-job:
    name: Locust stress smoke (no 5xx/crashes)
    runs-on: ubuntu-latest
    needs: resolve-and-validate-pr
    env:
      PGUSER: postgres
      PGPASSWORD: postgres
      HORDE_TEST_APIKEYS: '1'
      # Drive the telemetry instrumentation under load. No OTLP endpoint is set,
      # so logfire installs no exporters: spans/metrics are created and dropped
      # in-memory. This surfaces instrumentation crashes without any export I/O.
      AI_HORDE_TELEMETRY_ENABLED: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.resolve-and-validate-pr.outputs.merge_ref }}
          persist-credentials: false
      - uses: ./.github/actions/setup-test-python
        with:
          python-version: '3.13'
      - uses: ./.github/actions/start-test-stack

      - name: Start AI-Horde server
        run: |
          uv run python server.py -vvvvi --horde stable > server.log 2>&1 &
          echo "$!" > server.pid

          timeout=120
          until curl -sf http://localhost:7001/api/v2/status/heartbeat > /dev/null 2>&1; do
            timeout=$((timeout - 2))
            if [[ "$timeout" -le 0 ]]; then
              echo "Server failed to start within timeout"
              cat server.log
              exit 1
            fi
            sleep 2
          done

      - name: Run Locust smoke
        run: |
          uv run locust -f tests/stress/locustfile.py \
            --host http://localhost:7001 \
            --headless \
            --users 24 \
            --spawn-rate 6 \
            --run-time 90s \
            --bootstrap-requestors 4 \
            --bootstrap-workers 8 \
            --preflight-fail-hard \
            --bootstrap-fail-hard \
            --csv smoke \
            --exit-code-on-error 0 \
            --only-summary

      - name: Gate on crash-class failures
        run: uv run python tests/stress/check_smoke_results.py --stats smoke_stats.csv --failures smoke_failures.csv

      - name: Scan server log for tracebacks
        if: always()
        run: |
          if grep -n "Traceback (most recent call last)" server.log; then
            echo "::warning::Server log contains a Python traceback during the stress smoke; see the uploaded server.log artifact."
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-smoke-artifacts
          path: |
            server.log
            smoke_stats.csv
            smoke_failures.csv
            smoke_stats_history.csv
          if-no-files-found: ignore

      - name: Stop server and local test stack
        if: always()
        run: |
          if [[ -f server.pid ]]; then
            kill "$(cat server.pid)" || true
          fi
          docker compose -f tests/docker-compose.yml down
