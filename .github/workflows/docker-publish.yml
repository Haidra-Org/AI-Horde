name: Docker image publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # Build, push, and validate both runtime image variants:
  #   default   -> ghcr.io/haidra-org/ai-horde:<tag>
  #   telemetry -> ghcr.io/haidra-org/ai-horde:<tag>-telemetry
  # The telemetry variant installs the telemetry-profiling dependency group so
  # deployments can safely run with PYROSCOPE_ENABLED=true.
  # -----------------------------------------------------------
  build-push-and-validate:
    name: Build, publish, and validate (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            tag_suffix: ""
            dependency_groups: ""
            profiling_expected: "false"
          - variant: telemetry
            tag_suffix: "-telemetry"
            dependency_groups: "telemetry-profiling"
            profiling_expected: "true"
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    services:
      ai-horde-postgres:
        image: ghcr.io/haidra-org/ai-horde-postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.tag_suffix }},onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AI_HORDE_DEPENDENCY_GROUPS=${{ matrix.dependency_groups }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Pull published image
        if: github.event_name != 'pull_request'
        env:
          IMAGE_NAME_LC: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          IMAGE="$(echo "$IMAGE_NAME_LC" | tr '[:upper:]' '[:lower:]')@${{ steps.build.outputs.digest }}"
          docker pull "$IMAGE"
          docker tag "$IMAGE" "ai-horde-${{ matrix.variant }}:validate"
          echo "Pulled $IMAGE"

      - name: Tag PR image for validation
        if: github.event_name == 'pull_request'
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          IMAGE="$(printf '%s\n' "$IMAGE_TAGS" | head -n 1)"
          docker tag "$IMAGE" "ai-horde-${{ matrix.variant }}:validate"

      - name: Assert profiling dependency split
        run: |
          if [ "${{ matrix.profiling_expected }}" = "true" ]; then
            docker run --rm "ai-horde-${{ matrix.variant }}:validate" \
              python -c "import pyroscope, pyroscope.otel"
          else
            docker run --rm "ai-horde-${{ matrix.variant }}:validate" \
              python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('pyroscope') is None else 1)"
          fi

      # -- Common: run the container and health-check ----------
      - name: Start AI-Horde container
        run: |
          docker run -d --name "ai-horde-validate-${{ matrix.variant }}" \
            --network host \
            -e POSTGRES_URL="localhost:5432/postgres" \
            -e PGUSER=postgres \
            -e PGPASSWORD=postgres \
            -e REDIS_IP=localhost \
            -e 'REDIS_SERVERS=["localhost"]' \
            -e USE_SQLITE=0 \
            -e 'ADMINS=["test_user#1"]' \
            -e KUDOS_TRUST_THRESHOLD=100 \
            -e PYROSCOPE_ENABLED="${{ matrix.profiling_expected }}" \
            "ai-horde-${{ matrix.variant }}:validate"

      - name: Wait for healthy heartbeat
        run: |
          timeout=120
          while ! curl -sf http://localhost:7001/api/v2/status/heartbeat > /dev/null 2>&1; do
            timeout=$((timeout - 2))
            if [ "$timeout" -le 0 ]; then
              echo "::error::Image failed to pass health check within ${timeout}s"
              docker logs "ai-horde-validate-${{ matrix.variant }}"
              exit 1
            fi
            sleep 2
          done
          echo "Image validation passed; heartbeat responded OK"

      - name: Dump container logs on failure
        if: failure()
        run: docker logs "ai-horde-validate-${{ matrix.variant }}" 2>&1 || true
