name: Setup AI-Horde test Python
description: Install the requested Python version, uv, and the locked AI-Horde dependency environment.

inputs:
  python-version:
    description: Python version to install and use for uv sync.
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Sync locked dependencies
      shell: bash
      run: uv sync --locked --python "${{ inputs.python-version }}"
